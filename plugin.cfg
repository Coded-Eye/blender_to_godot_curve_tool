[plugin]

name="blender_to_godot_curve_tool"
description="An editor tool to import blender Bezier curves (  Nurbs will be treated as poly curves ) to godot as Path3D using the gLTF format.

This needs the accompaning blender gLTF add-on."
author="Coded-Eye"
version="1.0"
script="blender_to_godot_curve_tool.gd"
